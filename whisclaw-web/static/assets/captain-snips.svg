<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Captain's Hat -->
  <ellipse cx="100" cy="45" rx="55" ry="12" fill="#1a1a2e"/>
  <rect x="45" y="20" width="110" height="28" rx="6" fill="#2d2d44"/>
  <rect x="50" y="10" width="100" height="20" rx="5" fill="#3d3d5c"/>
  <!-- Gold hat band -->
  <rect x="50" y="38" width="100" height="6" rx="2" fill="#d4a017"/>
  <!-- Lobster body -->
  <ellipse cx="100" cy="100" rx="45" ry="55" fill="#e05545"/>
  <ellipse cx="100" cy="100" rx="38" ry="48" fill="#f07060"/>
  <!-- Body segments -->
  <path d="M60 80 Q100 75 140 80" stroke="#c04035" stroke-width="3" fill="none"/>
  <path d="M55 100 Q100 95 145 100" stroke="#c04035" stroke-width="3" fill="none"/>
  <path d="M58 120 Q100 115 142 120" stroke="#c04035" stroke-width="3" fill="none"/>
  <!-- Left claw -->
  <ellipse cx="42" cy="105" rx="22" ry="18" fill="#e05545"/>
  <ellipse cx="38" cy="103" rx="18" ry="14" fill="#f07060"/>
  <path d="M25 95 L15 80 L25 85 Z" fill="#e05545"/>
  <path d="M28 100 L12 92 L22 95 Z" fill="#e05545"/>
  <!-- Right claw -->
  <ellipse cx="158" cy="105" rx="22" ry="18" fill="#e05545"/>
  <ellipse cx="162" cy="103" rx="18" ry="14" fill="#f07060"/>
  <path d="M175 95 L185 80 L175 85 Z" fill="#e05545"/>
  <path d="M172 100 L188 92 L178 95 Z" fill="#e05545"/>
  <!-- Left eye stalk -->
  <rect x="78" y="60" width="10" height="22" rx="5" fill="#e05545"/>
  <circle cx="83" cy="58" r="9" fill="white"/>
  <circle cx="85" cy="58" r="5" fill="#1a1a2e"/>
  <circle cx="87" cy="56" r="2" fill="white"/>
  <!-- Right eye stalk -->
  <rect x="112" y="60" width="10" height="22" rx="5" fill="#e05545"/>
  <circle cx="117" cy="58" r="9" fill="white"/>
  <circle cx="119" cy="58" r="5" fill="#1a1a2e"/>
  <circle cx="121" cy="56" r="2" fill="white"/>
  <!-- Antennae -->
  <path d="M83 50 Q75 30 65 25" stroke="#e05545" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M117 50 Q125 30 135 25" stroke="#e05545" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M85 130 Q100 142 115 130" stroke="#c04035" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="62" y1="145" x2="48" y2="165" stroke="#e05545" stroke-width="4" stroke-linecap="round"/>
  <line x1="75" y1="150" x2="65" y2="172" stroke="#e05545" stroke-width="4" stroke-linecap="round"/>
  <line x1="88" y1="152" x2="82" y2="175" stroke="#e05545" stroke-width="4" stroke-linecap="round"/>
  <line x1="138" y1="145" x2="152" y2="165" stroke="#e05545" stroke-width="4" stroke-linecap="round"/>
  <line x1="125" y1="150" x2="135" y2="172" stroke="#e05545" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="152" x2="118" y2="175" stroke="#e05545" stroke-width="4" stroke-linecap="round"/>
  <!-- Tail -->
  <ellipse cx="100" cy="165" rx="20" ry="12" fill="#e05545"/>
  <ellipse cx="100" cy="175" rx="14" ry="8" fill="#f07060"/>
  <path d="M86 175 L100 185 L114 175" fill="#e05545"/>
</svg>
