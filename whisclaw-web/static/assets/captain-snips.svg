<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Shell gradient -->
    <radialGradient id="shellGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ff7b6b"/>
      <stop offset="50%" stop-color="#e05545"/>
      <stop offset="100%" stop-color="#a03025"/>
    </radialGradient>
    <!-- Claw gradient -->
    <radialGradient id="clawGrad" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ff8a78"/>
      <stop offset="60%" stop-color="#e05545"/>
      <stop offset="100%" stop-color="#b03020"/>
    </radialGradient>
    <!-- Hat gradient -->
    <linearGradient id="hatTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a6a"/>
      <stop offset="100%" stop-color="#2a2a3e"/>
    </linearGradient>
    <!-- Hat band gradient -->
    <linearGradient id="hatBand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <!-- Eye gradient -->
    <radialGradient id="eyeGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </radialGradient>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <!-- Ocean background -->
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d1f30"/>
    </linearGradient>
    <!-- Tail gradient -->
    <radialGradient id="tailGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff7b6b"/>
      <stop offset="100%" stop-color="#c03525"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#00000055"/>
    </filter>
    <!-- Glow for eyes -->
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glossy highlight -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Ocean waves at bottom -->
  <ellipse cx="200" cy="385" rx="220" ry="40" fill="url(#oceanGrad)" opacity="0.6"/>
  <ellipse cx="200" cy="375" rx="180" ry="30" fill="#1a4a6a" opacity="0.4"/>

  <!-- Platform rock -->
  <ellipse cx="200" cy="345" rx="90" ry="25" fill="#3a3a4a"/>
  <ellipse cx="200" cy="340" rx="80" ry="20" fill="#4a4a5a"/>
  <ellipse cx="200" cy="337" rx="65" ry="14" fill="#5a5a6a"/>

  <!-- === LOBSTER BODY === -->
  <g filter="url(#shadow)">
    <!-- Main body -->
    <ellipse cx="200" cy="240" rx="75" ry="95" fill="url(#shellGrad)"/>
    <!-- Body segment lines -->
    <path d="M135 190 Q200 182 265 190" stroke="#b03020" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M128 220 Q200 212 272 220" stroke="#b03020" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M130 250 Q200 242 270 250" stroke="#b03020" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M135 280 Q200 272 265 280" stroke="#b03020" stroke-width="3" fill="none" opacity="0.7"/>
    <!-- Shell sheen -->
    <ellipse cx="175" cy="195" rx="30" ry="45" fill="url(#gloss)" opacity="0.5"/>
  </g>

  <!-- === TAIL === -->
  <g>
    <ellipse cx="200" cy="330" rx="38" ry="22" fill="url(#tailGrad)"/>
    <ellipse cx="200" cy="348" rx="28" ry="16" fill="#d04030"/>
    <!-- Tail fan -->
    <path d="M172 348 Q200 375 228 348" fill="#e05545"/>
    <path d="M180 348 Q200 368 220 348" fill="#c03525"/>
    <!-- Tail segments -->
    <path d="M168 335 Q200 330 232 335" stroke="#b03020" stroke-width="2" fill="none"/>
    <path d="M175 345 Q200 340 225 345" stroke="#b03020" stroke-width="2" fill="none"/>
  </g>

  <!-- === LEGS (left side) === -->
  <line x1="135" y1="280" x2="100" y2="310" stroke="#c03525" stroke-width="6" stroke-linecap="round"/>
  <line x1="145" y1="295" x2="108" y2="325" stroke="#c03525" stroke-width="6" stroke-linecap="round"/>
  <line x1="158" y1="305" x2="125" y2="335" stroke="#c03525" stroke-width="6" stroke-linecap="round"/>
  <!-- Legs (right side) -->
  <line x1="265" y1="280" x2="300" y2="310" stroke="#c03525" stroke-width="6" stroke-linecap="round"/>
  <line x1="255" y1="295" x2="292" y2="325" stroke="#c03525" stroke-width="6" stroke-linecap="round"/>
  <line x1="242" y1="305" x2="275" y2="335" stroke="#c03525" stroke-width="6" stroke-linecap="round"/>

  <!-- === LEFT CLAW === -->
  <g>
    <!-- Arm -->
    <ellipse cx="95" cy="240" rx="20" ry="55" fill="url(#clawGrad)" transform="rotate(-15 95 240)"/>
    <!-- Claw main -->
    <ellipse cx="60" cy="200" rx="38" ry="30" fill="url(#clawGrad)"/>
    <!-- Claw inner -->
    <ellipse cx="50" cy="198" rx="28" ry="22" fill="#f07060"/>
    <!-- Upper pincer -->
    <path d="M28 185 L5 155 L28 165 Z" fill="#c03525"/>
    <path d="M30 180 L10 152 L30 162 Z" fill="#e05545"/>
    <!-- Lower pincer -->
    <path d="M32 195 L8 185 L28 200 Z" fill="#c03525"/>
    <path d="M34 192 L12 182 L30 196 Z" fill="#e05545"/>
    <!-- Claw sheen -->
    <ellipse cx="45" cy="185" rx="12" ry="18" fill="url(#gloss)" opacity="0.4"/>
  </g>

  <!-- === RIGHT CLAW === -->
  <g>
    <!-- Arm -->
    <ellipse cx="305" cy="240" rx="20" ry="55" fill="url(#clawGrad)" transform="rotate(15 305 240)"/>
    <!-- Claw main -->
    <ellipse cx="340" cy="200" rx="38" ry="30" fill="url(#clawGrad)"/>
    <!-- Claw inner -->
    <ellipse cx="350" cy="198" rx="28" ry="22" fill="#f07060"/>
    <!-- Upper pincer -->
    <path d="M372 185 L395 155 L372 165 Z" fill="#c03525"/>
    <path d="M370 180 L390 152 L370 162 Z" fill="#e05545"/>
    <!-- Lower pincer -->
    <path d="M368 195 L392 185 L372 200 Z" fill="#c03525"/>
    <path d="M366 192 L388 182 L370 196 Z" fill="#e05545"/>
    <!-- Claw sheen -->
    <ellipse cx="355" cy="185" rx="12" ry="18" fill="url(#gloss)" opacity="0.4"/>
  </g>

  <!-- === EYE STALKS === -->
  <!-- Left stalk -->
  <rect x="162" y="140" width="14" height="40" rx="7" fill="#c03525"/>
  <circle cx="169" cy="138" r="18" fill="url(#eyeGrad)" stroke="#b03020" stroke-width="2"/>
  <circle cx="173" cy="138" r="10" fill="#1a1a2e"/>
  <circle cx="177" cy="134" r="4" fill="white"/>
  <!-- Right stalk -->
  <rect x="224" y="140" width="14" height="40" rx="7" fill="#c03525"/>
  <circle cx="231" cy="138" r="18" fill="url(#eyeGrad)" stroke="#b03020" stroke-width="2"/>
  <circle cx="235" cy="138" r="10" fill="#1a1a2e"/>
  <circle cx="239" cy="134" r="4" fill="white"/>

  <!-- === ANTENNAE === -->
  <path d="M169 122 Q145 70 115 55" stroke="#c03525" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M231 122 Q255 70 285 55" stroke="#c03525" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Antenna balls -->
  <circle cx="115" cy="52" r="5" fill="#e05545"/>
  <circle cx="285" cy="52" r="5" fill="#e05545"/>

  <!-- === SMILE === -->
  <path d="M172 265 Q200 285 228 265" stroke="#8a1515" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- === CAPTAIN'S HAT === -->
  <g filter="url(#shadow)">
    <!-- Hat brim base shadow -->
    <ellipse cx="200" cy="100" rx="95" ry="18" fill="#15152a"/>
    <!-- Hat brim -->
    <ellipse cx="200" cy="95" rx="92" ry="16" fill="#1a1a2e"/>
    <ellipse cx="200" cy="92" rx="88" ry="14" fill="#252540"/>
    <!-- Hat crown -->
    <rect x="115" y="35" width="170" height="62" rx="12" fill="url(#hatTop)"/>
    <!-- Hat top -->
    <ellipse cx="200" cy="36" rx="85" ry="16" fill="#3a3a55"/>
    <ellipse cx="200" cy="33" rx="80" ry="14" fill="#4a4a65"/>
    <!-- Hat band -->
    <rect x="115" y="82" width="170" height="14" rx="3" fill="url(#hatBand)"/>
    <!-- Gold trim on band -->
    <line x1="115" y1="82" x2="285" y2="82" stroke="#f0c020" stroke-width="1" opacity="0.6"/>
    <line x1="115" y1="96" x2="285" y2="96" stroke="#8a6008" stroke-width="1" opacity="0.6"/>
    <!-- Anchor emblem on hat band (centered) -->
    <g transform="translate(200, 89)" fill="#1a1a2e" stroke="none">
      <!-- Anchor ring -->
      <circle cx="0" cy="-8" r="4" fill="none" stroke="#1a1a2e" stroke-width="2.5"/>
      <!-- Anchor shaft -->
      <rect x="-2" y="-5" width="4" height="20" rx="1"/>
      <!-- Anchor arms -->
      <path d="M-14 5 Q-14 12 0 12 Q14 12 14 5" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
      <!-- Arrow tips -->
      <path d="M-14 5 L-10 8 M-14 5 L-10 2" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M14 5 L10 8 M14 5 L10 2" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- Hat shine -->
    <ellipse cx="170" cy="50" rx="35" ry="12" fill="url(#gloss)" opacity="0.3"/>
  </g>

  <!-- === NAME BADGE === -->
  <!-- <text x="200" y="370" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#d4a017" text-anchor="middle" letter-spacing="3">CAPTAIN SNIPS</text> -->
</svg>
